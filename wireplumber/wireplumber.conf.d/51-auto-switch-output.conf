# WirePlumber: Auto-switch default sink when a headphone device connects/disconnects.
#
# This handles two headphone scenarios:
# 1. 3.5mm jack on the internal Ryzen card: WirePlumber detects a profile
#    change (Speaker → Headphones) and must update the default sink.
# 2. USB headset adapter (AB13X): When plugged in, it appears as a new sink
#    and should become the default.
#
# WirePlumber 0.5+ includes built-in jack detection that auto-selects the best
# profile (HiFi Headphones > HiFi Speaker) when available. The key piece below
# ensures the "best node" selection also considers availability so newly
# connected sinks get promoted to default.

device.rules = [
  {
    matches = [
      # Internal Ryzen audio card
      { device.name = "alsa_card.pci-0000_05_00.6" }
    ]
    actions = {
      update-props = {
        # When headphones are plugged in, WirePlumber will see the
        # "HiFi (Headphones, Mic1, Mic2)" profile become available
        # (priority 8500) vs "HiFi (Mic1, Mic2, Speaker)" (priority 8400).
        # find-best-profile.lua already picks the highest-priority
        # available profile, so this auto-switching is built in.
        # We just ensure the device isn't stuck on a saved profile.
        device.profile = null
      }
    }
  }
]

# Boost the priority of USB audio sinks so they win "best default sink"
# when plugged in (over the internal speaker).
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.usb-.*" }
    ]
    actions = {
      update-props = {
        priority.session = 2000
        priority.driver  = 2000
        node.nick         = "USB Headset"
      }
    }
  }
]
