# WirePlumber: Force consistent stream routing
#
# Problem 1: New browser media streams (e.g. Instagram reels) get a "fresh"
# PulseAudio stream each time, bypassing stream-restore because the stream
# key doesn't match what was saved. This resets volume to 100%.
#
# Fix: For Firefox (and Chromium), set node.autoconnect = true and lock the
# volume restore key to application.name only (not media.name which changes
# per-stream), so every new stream from Firefox always gets the same saved
# volume and device.
#
# Problem 2: When headphones are plugged in, only the default sink switches
# but individual app streams that were already pinned to the old device stay
# pinned. This makes you manually move each app.
#
# Fix: Do NOT pin streams to a specific device (no `node.target`). Let them
# follow the default sink. WirePlumber's default-nodes engine will then
# auto-move all streams when the default sink changes on headphone plug.

stream.rules = [
  # Firefox: restore volume by app name, let stream follow default sink
  {
    matches = [
      { application.process.binary = "firefox" }
      { application.name = "Firefox" }
    ]
    actions = {
      update-props = {
        node.autoconnect = true
        # Remove any saved device pin - follow default sink instead
        # node.target is intentionally NOT set here.
      }
    }
  }
  # Chromium browsers (if used)
  {
    matches = [
      { application.process.binary = "~chromium.*" }
      { application.process.binary = "~chrome.*" }
      { application.process.binary = "~brave.*" }
    ]
    actions = {
      update-props = {
        node.autoconnect = true
      }
    }
  }
]
