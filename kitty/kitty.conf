# ==================================================
# Kitty - Rose Pine Moon (Calm Aesthetic)
# ==================================================

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.5
disable_ligatures never

# Window
background_opacity 0.90
dynamic_background_opacity yes
confirm_os_window_close 0
remember_window_size yes
window_padding_width 10
hide_window_decorations no

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.6
cursor_stop_blinking_after 0
cursor_trail 8
cursor_trail_decay 0.15 0.7

# Bell
enable_audio_bell no
visual_bell_duration 0

# Scrolling
scrollback_lines 20000
wheel_scroll_multiplier 5.0

# Performance
repaint_delay 8
input_delay 2
sync_to_monitor yes

# Selection
copy_on_select yes
strip_trailing_spaces smart

# Tab Bar
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge top
tab_bar_margin_height 0 6

# Rose Pine Moon Palette
foreground              #e0def4
background              #232136
selection_foreground    #232136
selection_background    #c4a7e7

cursor                  #c4a7e7
cursor_text_color       #232136

url_color               #9ccfd8

active_border_color     #c4a7e7
inactive_border_color   #393552
bell_border_color       #eb6f92

active_tab_foreground   #232136
active_tab_background   #c4a7e7

inactive_tab_foreground #908caa
inactive_tab_background #2a273f

mark1_foreground #232136
mark1_background #f6c177

# Black
color0  #393552
color8  #6e6a86

# Red
color1  #eb6f92
color9  #eb6f92

# Green
color2  #3e8fb0
color10 #9ccfd8

# Yellow
color3  #f6c177
color11 #ea9a97

# Blue
color4  #9ccfd8
color12 #c4a7e7

# Magenta
color5  #c4a7e7
color13 #f6c177

# Cyan
color6  #9ccfd8
color14 #9ccfd8

# White
color7  #e0def4
color15 #e0def4

allow_remote_control yes
allow_remote_control yes
listen_on unix:/tmp/kitty

# Clipboard Operations
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
map ctrl+a pipe @text clipboard dummy
map ctrl+backspace send_text all \x17