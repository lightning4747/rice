# PipeWire-PulseAudio overrides for consistent audio routing
#
# Fixes:
# 1. Volume reset on Instagram/browser media elements: module-stream-restore
#    by default uses "sink-input-by-application-name:Firefox" as the key,
#    which correctly restores volume per app. The issue is that web browsers
#    sometimes create streams without matching the restore key, so we ensure
#    restore is per application.name only (not per media role or media name).
#
# 2. Auto-switch on connect: When a new sink appears (USB headset plugged in),
#    switch the default sink so ALL streams follow automatically.

pulse.rules = [
  {
    matches = [
      { application.process.binary = "firefox" }
    ]
    actions = {
      # Remove DONT_MOVE flag so Firefox streams can be migrated
      # to a new default sink when headphones are plugged in.
      quirks = [ remove-capture-dont-move ]
    }
  }
]
